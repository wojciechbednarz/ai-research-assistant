name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run pytest tests/ -m "not integration" -q
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: 8000
          OPEN_ROUTER_API_KEY: dummy
          LANGFUSE_PUBLIC_KEY: dummy
          LANGFUSE_SECRET_KEY: dummy

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run ruff check .

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4.2.2
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run mypy agent rag mcp_server main.py api.py config.py helpers.py schemas.py
