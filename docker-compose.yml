services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/data
    environment:
      - IS_PERSISTENT=TRUE

  app:
    build: .
    ports:
      - "8001:8001"
    env_file: .env
    environment:
      - CHROMA_HOST=chromadb
    depends_on:
      - chromadb
    command: >
      sh -c "until python -c 'import socket; socket.create_connection((\"chromadb\", 8000), 2)' 2>/dev/null; do echo 'waiting for chromadb...'; sleep 1; done;
      exec uvicorn main:app --host 0.0.0.0 --port 8001"

volumes:
  chroma_data:
